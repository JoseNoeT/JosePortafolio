services:
  - type: web
    name: jose-portafolio
    env: python
    rootDir: backend
    buildCommand: ../build.sh
    startCommand: gunicorn portafolio.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "jose-portafolio.onrender.com"
      - key: DATABASE_URL
        fromDatabase: jose-db

databases:
  - name: jose-db
    databaseName: jose_db
    user: jose_user
