{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Portafolio{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome (opcional) -->
    <script src="https://kit.fontawesome.com/your_kit_code.js" crossorigin="anonymous"></script>

    <!-- Estilo propio -->
    <link rel="stylesheet" href="{% static 'proyectos/css/style.css' %}">
</head>
<body>
    <!-- 🔹 Navbar de navegación -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">José Portafolio</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'home' %}">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled" href="#">Sobre mí</a> <!-- futura sección -->
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled" href="#">Contacto</a> <!-- futura sección -->
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 🔹 Contenido principal -->
    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- 🔹 Footer -->
    <footer class="text-center mt-5 mb-3 text-muted">
        © {{ now.year }} - José Miguel
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'proyectos/js/script.js' %}"></script>
</body>
</html>
