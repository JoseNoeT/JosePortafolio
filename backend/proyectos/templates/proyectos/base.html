{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Portafolio{% endblock %}</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tailwind (para clases utilitarias rápidas) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- AOS (Animaciones al hacer scroll) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">

    <!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="{% static 'proyectos/css/style.css' %}">
</head>
<body class="bg-dark text-light" style="font-family: 'Poppins', sans-serif;">

  <!-- 🔹 NAVBAR MODERNO -->
<nav class="navbar navbar-expand-lg navbar-dark bg-black shadow-sm sticky-top py-3" id="mainNav">
    <div class="container">
        <a class="navbar-brand fw-bold text-warning fs-3" href="{% url 'home' %}">José Miguel</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link nav-custom" href="{% url 'home' %}">Inicio</a></li>
                <li class="nav-item"><a class="nav-link nav-custom" href="{% url 'sobre_mi' %}">Sobre mí</a></li>
                <li class="nav-item"><a class="nav-link nav-custom" href="#">Proyectos</a></li>
                <li class="nav-item"><a class="nav-link nav-custom" href="#">Contacto</a></li>
            </ul>
        </div>
    </div>
</nav>


    <!-- 🔹 CONTENIDO PRINCIPAL -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- 🔹 FOOTER PROFESIONAL -->
    <footer class="bg-black text-center py-4 mt-5">
        <h4 class="fw-bold text-white mb-3" data-aos="fade-up">PORTAFOLIO PERSONAL</h4>
        <div class="mb-3">
            <a href="#" class="text-light me-3 hover:text-warning transition"><i class="fab fa-github fa-lg"></i></a>
            <a href="#" class="text-light me-3 hover:text-warning transition"><i class="fab fa-twitter fa-lg"></i></a>
            <a href="#" class="text-light hover:text-warning transition"><i class="fab fa-linkedin fa-lg"></i></a>
        </div>
        <p class="mb-1 text-gray-400">correo@ejemplo.com · 126-453-2600</p>
        <p class="text-muted mb-0">© {{ now.year }} José Miguel, Todos los derechos reservados.</p>
    </footer>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init(); // Inicializa animaciones al hacer scroll
    </script>
    <script src="{% static 'proyectos/js/script.js' %}"></script>
</body>
</html>
