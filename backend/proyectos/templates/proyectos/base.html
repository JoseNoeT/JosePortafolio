{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Portafolio{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <script src="https://kit.fontawesome.com/your_kit_code.js" crossorigin="anonymous"></script>

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="{% static 'proyectos/css/style.css' %}">
</head>
<body class="bg-dark text-light">

    <!-- 🔹 NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="{% url 'home' %}">José Miguel</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Sobre mí</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Proyectos</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 🔹 CONTENIDO PRINCIPAL -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- 🔹 FOOTER PROFESIONAL -->
    <footer class="bg-black text-center py-4 mt-5">
        <h4 class="fw-bold text-white mb-3">PORTAFOLIO PERSONAL</h4>
        <div class="mb-3">
            <a href="#" class="text-light me-3"><i class="fab fa-github fa-lg"></i></a>
            <a href="#" class="text-light me-3"><i class="fab fa-twitter fa-lg"></i></a>
            <a href="#" class="text-light"><i class="fab fa-linkedin fa-lg"></i></a>
        </div>
        <p class="mb-1">correo@ejemplo.com · 126-453-2600</p>
        <p class="text-muted mb-0">© {{ now.year }} José Miguel, Todos los derechos reservados.</p>
    </footer>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'proyectos/js/script.js' %}"></script>
</body>
</html>
