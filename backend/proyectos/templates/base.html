{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Portafolio de José Miguel{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS personalizado -->
    <link rel="stylesheet" href="{% static 'proyectos/css/style.css' %}">
</head>
<body>

    <!-- 🧠 HEADER -->
    <header class="bg-dark text-white py-3">
        <div class="container">
            <h1 class="h3">Portafolio de José Miguel</h1>
        </div>
    </header>

    <!-- 📄 CONTENIDO -->
    <main class="container my-5">
        {% block content %}
        {% endblock %}
    </main>

    <!-- 👣 FOOTER -->
    <footer class="bg-light text-center py-4 mt-auto border-top">
        <div class="container">
            <p class="mb-0">© {{ now.year }} José Miguel Noe Torres. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS personalizado -->
    <script src="{% static 'proyectos/js/script.js' %}"></script>

</body>
</html>
